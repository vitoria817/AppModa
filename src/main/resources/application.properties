# Conexão com o banco PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/appmoda
spring.datasource.username=postgres
spring.datasource.password=Vitoria

# Atualiza as tabelas automaticamente ao rodar
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL no console do IntelliJ
spring.jpa.show-sql=true

# Dialeto do PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Porta do servidor
server.port=8080

# Login com Google (coloque seus dados do Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=SEU_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=SEU_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# URL de redirecionamento após login com Google
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# Thymeleaf: desliga cache para ver mudanças sem reiniciar (modo dev)
spring.thymeleaf.cache=false

# Mostra erros detalhados no navegador (modo dev)
server.error.include-message=always
server.error.include-binding-errors=always